# Semspec development stack
# Usage: docker compose up -d
# With port offsets: docker compose -f docker-compose.yml -f docker-compose.noconflict.yml up -d
# Then open http://localhost:8080 (or :8180 with noconflict)

services:
  nats:
    image: nats:2.12-alpine
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 3

  sandbox:
    build:
      context: .
      dockerfile: docker/sandbox.Dockerfile
    volumes:
      - ${SEMSPEC_REPO:-.}:/repo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  semspec:
    image: ghcr.io/c360studio/semspec:main
    depends_on:
      nats:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SANDBOX_URL=http://sandbox:8090
      - OLLAMA_HOST=${OLLAMA_HOST:-http://host.docker.internal:11434}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    depends_on:
      semspec:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://gateway:8080
    volumes:
      - ./ui/src:/app/src:ro
      - ./ui/static:/app/static:ro

  gateway:
    image: caddy:2-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./ui/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      semspec:
        condition: service_healthy
      ui:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/readyz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  nats-data:
