# Docker Compose overlay for the Meshtastic/OSH epic E2E scenario.
# Adds 3 external semsource instances for knowledge graph indexing.
#
# Usage:
#   docker compose -f docker/compose/e2e.yml -f docker/compose/e2e-llm.yml -f docker/compose/e2e-epic.yml up -d
#
# Or via task:
#   task e2e:epic -- claude
#
# This overlay:
#   1. Adds semsource-osh (OpenSensorHub Java code)
#   2. Adds semsource-meshtastic (Meshtastic documentation)
#   3. Adds semsource-ogc (OGC Connected Systems spec)
#   4. Configures semspec with GRAPH_SOURCES pointing to all instances
#   5. Adds semembed for vector embeddings (required for graph_search)
#   6. Mounts a shared semsource-clones volume so the agent's sandbox can
#      read upstream source files (pom.xml, LICENSE, build configs) that
#      semsource clones but doesn't index as graph entities. Closes the
#      "graph indexes structure but not file contents" gap that drove
#      Maven-coord fabrication on take-1 (gemini @hard 2026-05-10): with
#      /sources/<namespace>/ readable, the agent can `cat osh-core/pom.xml`
#      to copy correct coords instead of inventing them. Mount is rw on
#      the semsource side, ro on the sandbox side.

volumes:
  semsource-clones:
    driver: local

services:
  # External semsource: OpenSensorHub core (Java)
  semsource-osh:
    image: ghcr.io/c360studio/semsource:latest
    environment:
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../../configs/semsource/osh.json:/etc/semsource/semsource.json:ro
      - semsource-clones:/shared/sources
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 60s  # OSH repo is large — cloning takes time
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # External semsource: Meshtastic documentation
  semsource-meshtastic:
    image: ghcr.io/c360studio/semsource:latest
    environment:
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../../configs/semsource/meshtastic.json:/etc/semsource/semsource.json:ro
      - semsource-clones:/shared/sources
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # External semsource: OGC Connected Systems spec
  semsource-ogc:
    image: ghcr.io/c360studio/semsource:latest
    environment:
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../../configs/semsource/ogc.json:/etc/semsource/semsource.json:ro
      - semsource-clones:/shared/sources
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Override semspec to configure federated graph sources for external semsource instances.
  # No depends_on — registry's lazy readiness handles semsource availability.
  semspec:
    environment:
      - GRAPH_SOURCES=[{"name":"osh","url":"http://semsource-osh:8080","type":"semsource"},{"name":"meshtastic","url":"http://semsource-meshtastic:8080","type":"semsource"},{"name":"ogc","url":"http://semsource-ogc:8080","type":"semsource"}]
      - SEMSOURCE_READINESS_BUDGET=60s

  # Sandbox override: read-only mount of the shared semsource-clones volume
  # so agent bash can read upstream source the graph indexes (file contents
  # the AST/docs lens drops — pom.xml, package.json, LICENSE, Makefile, etc.).
  # ro is the security posture: agent observes upstream truth, can't poison it.
  sandbox:
    volumes:
      - semsource-clones:/sources:ro
