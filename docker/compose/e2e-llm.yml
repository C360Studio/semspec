# Docker Compose override for multi-provider E2E testing.
# Usage: docker compose -f docker/compose/e2e.yml -f docker/compose/e2e-llm.yml up -d
#
# Passes through LLM API keys from the host environment and allows
# config file selection via E2E_CONFIG env var.
#
# Providers:
#   local               - Ollama running on host (no API key needed)
#   claude              - Anthropic Claude via ANTHROPIC_API_KEY
#   openrouter          - OpenRouter via OPENROUTER_API_KEY
#   gemini              - Google AI Studio via GEMINI_API_KEY (mapped to OPENAI_API_KEY)
#   sparky              - friend-hosted Qwen3.6-27B-FP8 (vLLM) via SPARKY_API_KEY
#
# Environment variables:
#   E2E_CONFIG           - Config file name (default: semspec.json), e.g. e2e-local.json
#   LLM_API_URL          - Ollama URL (default: http://host.docker.internal:11434)
#   ANTHROPIC_API_KEY    - Anthropic API key (for Claude provider)
#   OPENAI_API_KEY       - OpenAI API key (for OpenRouter and Gemini providers)
#   OPENROUTER_SITE_URL  - OpenRouter attribution URL
#   OPENROUTER_SITE_NAME - OpenRouter attribution name
#   GEMINI_API_KEY       - Google AI Studio key (mapped to OPENAI_API_KEY inside container)

services:
  semspec:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["--config", "/app/configs/${E2E_CONFIG:-semspec.json}", "--repo", "/workspace", "--log-level", "${LOG_LEVEL:-info}"]
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSPEC_REPO_PATH=/workspace
      - LLM_API_URL=http://host.docker.internal:11434
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - SPARKY_API_KEY=${SPARKY_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENROUTER_SITE_URL=${OPENROUTER_SITE_URL:-https://semspec.dev}
      - OPENROUTER_SITE_NAME=${OPENROUTER_SITE_NAME:-semspec}
      # Per-tier timeout overlay (option B). Defaults baked into the config
      # files (3600s req-executor / 60s recovery / 3600s exec-manager / 3600s
      # scenario-orchestrator) suit easy/medium tiers; the watch:llm task
      # exports larger values for hard/mavlink-hard before invoking compose.
      # Avoids editing the shared config for one tier and silently bloating
      # the easy CI signal. See memory feedback_recovery_budget_match_playwright_cycles
      # — these MUST stay aligned with Playwright EXECUTION_TIMEOUT.
      - SEMSPEC_REQ_EXECUTOR_TIMEOUT_SECONDS=${SEMSPEC_REQ_EXECUTOR_TIMEOUT_SECONDS:-}
      - SEMSPEC_RECOVERY_TIMEOUT_SECONDS=${SEMSPEC_RECOVERY_TIMEOUT_SECONDS:-}
      - SEMSPEC_EXECUTION_MANAGER_TIMEOUT_SECONDS=${SEMSPEC_EXECUTION_MANAGER_TIMEOUT_SECONDS:-}
      - SEMSPEC_SCENARIO_ORCH_TIMEOUT=${SEMSPEC_SCENARIO_ORCH_TIMEOUT:-}
      - SEMSPEC_MAX_REQUIREMENT_RETRIES=${SEMSPEC_MAX_REQUIREMENT_RETRIES:-}
