# Docker Compose override for mock LLM E2E testing.
# Usage: docker compose -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml up -d
#
# Adds a mock-llm container that serves deterministic fixture responses
# via OpenAI-compatible API. No real LLM required — tests are fast,
# deterministic, and work offline.
#
# The semspec container is configured to use the mock provider config
# which routes all LLM calls to http://mock-llm:11434/v1.

services:
  # Mock configs use BM25 graph embedding and do not call the local graph
  # model services. Keep these dependency placeholders healthy so the base
  # e2e stack can boot without pulling/loading Snowflake or Qwen images.
  semembed:
    image: alpine:3.19
    command: ["sh", "-c", "tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      timeout: 1s
      retries: 1

  seminstruct-fast:
    image: alpine:3.19
    command: ["sh", "-c", "tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      timeout: 1s
      retries: 1

  seminstruct-answer:
    image: alpine:3.19
    command: ["sh", "-c", "tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      timeout: 1s
      retries: 1

  seminstruct-summary:
    image: alpine:3.19
    command: ["sh", "-c", "tail -f /dev/null"]
    healthcheck:
      test: ["CMD", "true"]
      interval: 1s
      timeout: 1s
      retries: 1

  mock-llm:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.mock-llm
    environment:
      - MOCK_SCENARIO=${MOCK_SCENARIO:-plan-smoke}
    ports:
      - "11535:11434"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:11434/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  semspec:
    # Run as the host uid (set by CI to the runner user; default 0/root locally
    # — Mac Docker Desktop maps it transparently) so the /workspace files semspec
    # writes are host-owned and the host-side e2e runner can clean them between
    # scenarios. semspec only writes /workspace (+ /tmp); /etc/gitconfig (built
    # in) gives it a HOME-independent git identity. See issue #258.
    user: "${SANDBOX_UID:-0}:${SANDBOX_GID:-0}"
    command: ["--config", "/app/configs/e2e-mock.json", "--repo", "/workspace", "--log-level", "${LOG_LEVEL:-info}"]
    environment:
      - HOME=/tmp
      - NATS_URL=nats://nats:4222
      - SEMSPEC_REPO_PATH=/workspace
      - SANDBOX_URL=http://sandbox:8090
      # Mock-LLM fixtures don't depend on semsource graph data, so don't
      # wait the full 60s readiness budget before the first plan dispatches.
      # Base e2e.yml sets 60s which consistently pushed wait-for-plan-goal
      # past its 60s scenario timeout. 5s is plenty — if semsource is going
      # to come up in a mock stack it's up in milliseconds.
      - SEMSOURCE_READINESS_BUDGET=5s
      # Mock-LLM speaks OpenAI-compat /v1/* but not Ollama's /api/show.
      # The boot probe (model.ProbeOllamaEndpoints) WARNs noisily against
      # every mock endpoint when not suppressed — skip the probe in mock
      # stacks since "model not pulled" is meaningless against a fixture
      # server.
      - SEMSPEC_SKIP_OLLAMA_PROBE=1
      # ADR-051 Slice 3 architecture-review round. Default off so every other
      # mock scenario keeps the two-round reviewer sequence; the e2e:mock task
      # flips this to true ONLY for the arch-review scenario (which enables the
      # round and adds a third, R-arch, reviewer dispatch). Both plan-reviewer
      # and story-preparer read it from configs/e2e-mock.json so they agree.
      - ARCHITECTURE_REVIEW_ENABLED=${ARCHITECTURE_REVIEW_ENABLED:-false}
      # ADR-051 Slice 4 requirements-review round (default off; the e2e:mock task
      # flips it true ONLY for the req-review scenario). plan-reviewer and
      # architecture-generator both read it from configs/e2e-mock.json so they agree.
      - REQUIREMENTS_REVIEW_ENABLED=${REQUIREMENTS_REVIEW_ENABLED:-false}
    depends_on:
      nats:
        condition: service_healthy
      mock-llm:
        condition: service_healthy

  # The sandbox is built with SANDBOX_UID/SANDBOX_GID (CI sets them to the runner
  # user; default 1000) so its `sandbox` user — with a real passwd entry and an
  # owned HOME — matches semspec's uid. Every /workspace write across both
  # containers is then host-owned and cleanable by the host-side e2e runner,
  # closing the root-vs-runner ownership conflict on Linux runners. See #258.
