# Docker Compose override for mock LLM E2E testing.
# Usage: docker compose -f docker/compose/e2e.yml -f docker/compose/e2e-mock.yml up -d
#
# Adds a mock-llm container that serves deterministic fixture responses
# via OpenAI-compatible API. No real LLM required — tests are fast,
# deterministic, and work offline.
#
# The semspec container is configured to use the mock provider config
# which routes all LLM calls to http://mock-llm:11434/v1.

services:
  mock-llm:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.mock-llm
    environment:
      - MOCK_SCENARIO=${MOCK_SCENARIO:-hello-world}
    ports:
      - "11535:11434"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:11434/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  semspec:
    command: ["--config", "/app/configs/e2e-mock.json", "--repo", "/workspace", "--log-level", "${LOG_LEVEL:-info}"]
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSPEC_REPO_PATH=/workspace
      - SANDBOX_URL=http://sandbox:8090
      # Mock-LLM fixtures don't depend on semsource graph data, so don't
      # wait the full 60s readiness budget before the first plan dispatches.
      # Base e2e.yml sets 60s which consistently pushed wait-for-plan-goal
      # past its 60s scenario timeout. 5s is plenty — if semsource is going
      # to come up in a mock stack it's up in milliseconds.
      - SEMSOURCE_READINESS_BUDGET=5s
      # Mock-LLM speaks OpenAI-compat /v1/* but not Ollama's /api/show.
      # The boot probe (model.ProbeOllamaEndpoints) WARNs noisily against
      # every mock endpoint when not suppressed — skip the probe in mock
      # stacks since "model not pulled" is meaningless against a fixture
      # server.
      - SEMSPEC_SKIP_OLLAMA_PROBE=1
    depends_on:
      nats:
        condition: service_healthy
      mock-llm:
        condition: service_healthy
