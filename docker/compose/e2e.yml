services:
  nats:
    image: nats:2.12-alpine
    ports:
      - "4322:4222"
      - "8322:8222"
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  semsource:
    image: ghcr.io/c360studio/semsource:latest
    depends_on:
      nats:
        condition: service_healthy
      semspec:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_WS_BIND=0.0.0.0:7890
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../../docker/semsource.json:/etc/semsource/semsource.json:ro
      # Bind-mount a gitconfig that marks every repo as safe. Without this, git
      # refuses host-owned repos when semsource runs as root and initial clone
      # retries for 2m30s before succeeding on subsequent attempts.
      - ../../docker/semsource.gitconfig:/root/.gitconfig:ro
      - ../../test/e2e/workspace:/workspace:ro
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3
    # 12-core host budget. Bursty at seed, idle after.
    deploy:
      resources:
        limits:
          cpus: "1"

  semspec:
    build:
      context: ../..
      dockerfile: docker/Dockerfile
    ports:
      - "8180:8080"
      - "9190:9090"   # Prometheus metrics
      # graph-gateway registers handlers with the service manager at /graph-gateway/*
      # standalone :8082 is for unit test support only, not needed in e2e
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["--config", "/app/configs/e2e.json", "--repo", "/workspace", "--log-level", "${LOG_LEVEL:-info}"]
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSPEC_REPO_PATH=/workspace
      # PROJECT_HOST_PATH is the HOST path to the workspace (needed so qa-runner
      # can bind-mount the same tree into act's sibling containers).
      - PROJECT_HOST_PATH=${PWD}/test/e2e/workspace
      - LLM_API_URL=http://host.docker.internal:11434
      - SANDBOX_URL=http://sandbox:8090
      # bash tool default 120s is too aggressive for fixtures that exercise
      # full toolchain installs/compiles (mvn test, cargo build, npm install).
      # See ui/docker-compose.e2e.yml for the @hard mvn-test wedge that drove
      # this; mirror the bump here for backend e2e symmetry.
      - SEMSPEC_BASH_TIMEOUT=600s
      - GRAPH_SOURCES=[{"name":"workspace","url":"http://semsource:8080","type":"semsource"}]
      - SEMSOURCE_READINESS_BUDGET=60s
    volumes:
      - ../../test/e2e/workspace:/workspace
    depends_on:
      nats:
        condition: service_healthy
      # Gate on small-model graph stack so graph-embedding worker doesn't
      # race against semembed's HTTP listener at boot (caught 2026-05-02).
      # semembed's healthcheck probes /v1/embeddings (real path); these
      # gates are honest. seminstruct-fast/summary not strictly required
      # by workflow path but gating prevents graph-query LLM calls from
      # racing if their model-load is slow.
      semembed:
        condition: service_healthy
      seminstruct-fast:
        condition: service_healthy
      seminstruct-answer:
        condition: service_healthy
      seminstruct-summary:
        condition: service_healthy
    healthcheck:
      # Internal port stays 8080, external mapping is 8180
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/project-manager/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  sandbox:
    build:
      context: ../..
      dockerfile: docker/sandbox.Dockerfile
      args:
        SANDBOX_UID: ${SANDBOX_UID:-1000}
        SANDBOX_GID: ${SANDBOX_GID:-1000}
    ports:
      - "8190:8090"
    command: ["--addr", ":8090", "--repo", "/workspace"]
    environment:
      # Enables the qa-unit subscriber during E2E runs that exercise qa_level=unit.
      - NATS_URL=nats://nats:4222
    volumes:
      - ../../test/e2e/workspace:/workspace
      # DooD for Testcontainers — dev's TDD loop spawns real integration-test
      # containers via the host docker daemon. Trust boundary maintained by
      # tool-call governance rules (configs/e2e-hybrid.json) that deny bash
      # escape shapes like `docker run --privileged`.
      - /var/run/docker.sock:/var/run/docker.sock
    # The host docker socket is mounted with its native ownership preserved
    # by the docker daemon. Mac Docker Desktop translates the socket to
    # root:root mode 660 inside containers, so the sandbox user (uid 1000)
    # needs supplementary membership in root group (GID 0) to access it.
    # Linux hosts with rootful docker typically use root:docker (GID ~999);
    # set DOCKER_GID in .env to that value on those hosts. Default 0 covers
    # the Mac dev path; Linux CI override is one env var away.
    group_add:
      - "${DOCKER_GID:-0}"
    depends_on:
      nats:
        condition: service_healthy
      # Same WORKFLOW-stream race as qa-runner — sandbox's qa-unit subscriber
      # exits with code 1 if the stream isn't ready within ~60s of NATS
      # connect. Gate on semspec health so the stream exists by then.
      semspec:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
          pids: 256
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # semembed serves graph-embedding's HTTP embedder (replacing BM25).
  # Background batch — embeds entity text on every ENTITY_STATES write.
  semembed:
    image: ghcr.io/c360studio/semembed:latest
    environment:
      - SEMEMBED_MODEL=Snowflake/snowflake-arctic-embed-s
      - RUST_LOG=info
    # Probe the real embeddings endpoint, not /health.
    # Caught 2026-05-02: /health returns 200 ~939ms before the Rust HTTP
    # listener actually accepts POSTs, so service_healthy fired early
    # and graph-embedding's first 5 entities got connection-refused.
    # POST /v1/embeddings exercises the full handler chain — only passes
    # once the listener is genuinely serving requests.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS -X POST http://localhost:8081/v1/embeddings
          -H 'Content-Type: application/json'
          -d '{"model":"Snowflake/snowflake-arctic-embed-s","input":"x"}'
          >/dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      # start_period covers cold-load and slow-network first-pull scenarios.
      # Empirical: warm-disk model load ~80-90s; first-time HF fetch on a slow
      # connection adds another minute or two. 180s start_period + 50s post-
      # start retry budget (5 × 10s) = 230s total grace before unhealthy. No
      # cost on warm-load runs — start_period only suppresses failure counting,
      # doesn't delay the healthy transition.
      start_period: 180s
    # 12-core host budget; 1 CPU is plenty for arctic-embed-s.
    deploy:
      resources:
        limits:
          cpus: "1"

  # seminstruct-fast → query_classification (T3 fallback). 0.6B, no thinking.
  #
  # CPU budget: 1 CPU + MODEL_THREADS=1. Without these caps, llama.cpp's
  # OpenMP grabs all 12 host cores and competes with the other 2 seminstruct
  # containers + 4 semsources, oversubscribing ~4.5×. See seminstruct
  # Dockerfile MODEL_THREADS docstring.
  seminstruct-fast:
    image: ghcr.io/c360studio/seminstruct:qwen3-0.6b
    environment:
      - MODEL_ALIAS=qwen3-0.6b
      - MODEL_REASONING=off
      - MODEL_THREADS=1
      - MODEL_PARALLEL=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 4G

  # seminstruct-answer → answer_synthesis (graph_search → globalSearch).
  # 1.7B is sub-3s per ephemeral answer on Apple Silicon CPU; quality is
  # solid because answer_synthesis is extractive over supplied community
  # summaries. The 8B is reserved for community_summary, where MS GraphRAG
  # research showed sub-7B saves garbage to the persisted graph. Probed
  # 2026-05-05: ~25 tok/s warm, vs 8B's 0.83 tok/s on the same hardware.
  #
  # CPU budget: 2 CPUs + MODEL_THREADS=2. See seminstruct-fast comment.
  seminstruct-answer:
    image: ghcr.io/c360studio/seminstruct:qwen3-1.7b
    environment:
      - MODEL_ALIAS=qwen3-1.7b
      - MODEL_REASONING=off
      - MODEL_THREADS=2
      - MODEL_PARALLEL=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 6G

  # seminstruct-summary → community_summary only (background batch,
  # persisted into graph). 8B is required per MS GraphRAG quality bar.
  # REASONING=off because auto/think eats the entire token budget before
  # producing content (verified 2026-05-05). Concurrent inference (-np 4
  # -cb baked into the image) so parallel batches don't queue head-of-line.
  #
  # CPU budget: 2 CPUs + MODEL_THREADS=2 + MODEL_PARALLEL=1. graph-clustering's
  # enable_llm:false means this container is dormant during runs. 8G memory
  # cap OOM-killed (exit 137) on first @hard run with caps applied; bumped
  # to 12G with 1 KV slot to fit GGUF + transient llama.cpp init spikes.
  seminstruct-summary:
    image: ghcr.io/c360studio/seminstruct:qwen3-8b
    environment:
      - MODEL_ALIAS=qwen3-8b
      - MODEL_REASONING=off
      - MODEL_THREADS=2
      - MODEL_PARALLEL=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 12G

volumes:
  nats-data:

networks:
  default:
    name: semspec-e2e
