services:
  nats:
    image: nats:2.12-alpine
    ports:
      - "4223:4222"  # Offset to avoid backend E2E collision
      - "8223:8222"  # Offset to avoid backend E2E collision
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - ui-nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  semspec:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Uses default semspec.json config - env vars override Docker-specific values
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NATS_URL=nats://nats:4222
      - LLM_API_URL=http://host.docker.internal:11434
      - SEMSPEC_REPO_PATH=/workspace
      - LOG_LEVEL=${LOG_LEVEL:-info}
    ports:
      # Prometheus metrics scrape — exposed so host-side ops tooling and the
      # UI /status widgets can read semstreams_agentic_* counters. Offset to
      # avoid the backend E2E stack's 9090.
      - "9190:9090"
    volumes:
      - ../test/e2e/fixtures/go-project:/workspace
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/project-manager/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        - VITE_USE_MOCKS=false
    environment:
      - ORIGIN=http://caddy:3000
      - PORT=3000
    depends_on:
      semspec:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile.e2e:/etc/caddy/Caddyfile
    depends_on:
      ui:
        condition: service_healthy
      semspec:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # qa-runner handles integration and full QA tiers via nektos/act.
  # Port offset +200 from dev (8091) → 8291 for UI-E2E isolation.
  qa-runner:
    build:
      context: ..
      dockerfile: docker/qa-runner.Dockerfile
    ports:
      - "8291:8091"
    depends_on:
      nats:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - PROJECT_HOST_PATH=${SEMSPEC_REPO:-/workspace}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../test/e2e/fixtures/go-project:/workspace
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8091/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  ui-nats-data:

networks:
  default:
    name: semspec-ui-e2e
