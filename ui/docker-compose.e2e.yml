services:
  # workspace-init snapshots the fixture into a host-bind-mount tmpdir at
  # stack-up. Rationale: in production, /workspace is the user's actual repo
  # (bind-mount — semspec writing project.json timestamps is fine because
  # they own the file). In e2e, the fixture is supposed to be IMMUTABLE test
  # data; a bind-mount directly to the fixture conflates "test seed" and
  # "scratch workspace" and any runtime write to .semspec/* leaks back into
  # the parent semspec repo as drift.
  #
  # The intermediate WORKSPACE_HOST_PATH tmpdir is a host bind-mount (not a
  # Docker named volume) for one specific reason: qa-runner spawns `act`
  # sibling containers via the docker socket, and act --bind needs a HOST
  # filesystem path that the docker daemon recognizes for sibling-container
  # mounts. Named volumes have no usable host path on Docker Desktop. The
  # bind-mount tmpdir gives us snapshot isolation (init container cp's
  # fixture → tmpdir, agents and project-manager write to tmpdir not
  # fixture) AND a host path qa-runner / act can use.
  #
  # `find -delete; cp -a` makes the snapshot deterministic per stack-up so
  # the fixture-as-snapshot invariant holds regardless of what agents (or
  # project-manager PATCHes) do during a run.
  workspace-init:
    image: alpine:3.19
    # chown after cp so the sandbox user (uid SANDBOX_UID:1000 — runs git
    # ops in /workspace and trips git's "dubious ownership" guard otherwise)
    # owns the snapshot. semspec + qa-runner run as root and can rw any
    # uid via root's normal access; only the sandbox user needs to be the
    # nominal owner for git to operate.
    command:
      - sh
      - -c
      - "find /target -mindepth 1 -delete && cp -a /fixture/. /target/ && chown -R ${SANDBOX_UID:-1000}:${SANDBOX_GID:-1000} /target"
    volumes:
      - ../test/e2e/fixtures/${E2E_FIXTURE:-go-project}:/fixture:ro
      - ${WORKSPACE_HOST_PATH:-/tmp/semspec-ui-workspace}:/target
    restart: "no"

  nats:
    image: nats:2.12-alpine
    ports:
      - "4223:4222"  # Offset to avoid backend E2E collision
      - "8223:8222"  # Offset to avoid backend E2E collision
    command: ["--jetstream", "--store_dir=/data", "-m", "8222"]
    volumes:
      - ui-nats-data:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  semspec:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # Uses default semspec.json config - env vars override Docker-specific values
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - NATS_URL=nats://nats:4222
      - LLM_API_URL=http://host.docker.internal:11434
      - SEMSPEC_REPO_PATH=/workspace
      # PROJECT_HOST_PATH is the HOST filesystem path of /workspace, embedded
      # in QARequestedEvent so qa-runner can act-bind-mount it into sibling
      # containers. Must match WORKSPACE_HOST_PATH and the qa-runner mount
      # below. Without this, plan-manager refuses to publish the QA event
      # for qa_level=integration/full plans and the plan sits in
      # ready_for_qa until test timeout (caught take-34 2026-05-17).
      - PROJECT_HOST_PATH=${WORKSPACE_HOST_PATH:-/tmp/semspec-ui-workspace}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      # bash tool default timeout (120s) is too aggressive for e2e fixtures
      # that exercise full toolchain installs/compiles: mvn test cold-cache
      # on the @hard Meshtastic fixture pulls Maven deps + compiles +
      # runs tests. Confirmed 2026-05-05 hybrid @hard run: agent's
      # `mvn test` calls hit the 120s deadline 3+ times per loop, RetryToolFailure
      # critical detector fired. 600s covers cold-cache mvn/cargo/npm/go-build.
      - SEMSPEC_BASH_TIMEOUT=600s
    ports:
      # Prometheus metrics scrape — exposed so host-side ops tooling and the
      # UI /status widgets can read semstreams_agentic_* counters. Offset to
      # avoid the backend E2E stack's 9090.
      - "9190:9090"
    volumes:
      - ${WORKSPACE_HOST_PATH:-/tmp/semspec-ui-workspace}:/workspace
    depends_on:
      workspace-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      # Gate on small-model graph stack so graph-embedding worker doesn't
      # race against semembed's HTTP listener at boot. semembed's
      # healthcheck probes /v1/embeddings (real path), so this gate is
      # honest. seminstruct-fast/summary not strictly required by
      # workflow path but gating prevents graph-query LLM calls from
      # racing if their model-load is slow.
      semembed:
        condition: service_healthy
      seminstruct-fast:
        condition: service_healthy
      seminstruct-answer:
        condition: service_healthy
      seminstruct-summary:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/project-manager/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  ui:
    build:
      context: .
      dockerfile: Dockerfile.e2e
      args:
        - VITE_USE_MOCKS=false
    environment:
      - ORIGIN=http://caddy:3000
      - PORT=3000
    depends_on:
      semspec:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./Caddyfile.e2e:/etc/caddy/Caddyfile
    depends_on:
      ui:
        condition: service_healthy
      semspec:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # semembed serves graph-embedding's HTTP embedder (replacing BM25).
  # Background batch — embeds entity text on every ENTITY_STATES write.
  # Default model produces 384-dim vectors via fastembed-rs.
  semembed:
    image: ghcr.io/c360studio/semembed:latest
    environment:
      - SEMEMBED_MODEL=Snowflake/snowflake-arctic-embed-s
      - RUST_LOG=info
    # Probe the real embeddings endpoint, not /health.
    # Caught 2026-05-02: /health returns 200 ~939ms before the Rust HTTP
    # listener actually accepts POSTs, so service_healthy fired early
    # and graph-embedding's first 5 entities got connection-refused.
    # POST /v1/embeddings exercises the full handler chain — only passes
    # once the listener is genuinely serving requests.
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          curl -fsS -X POST http://localhost:8081/v1/embeddings
          -H 'Content-Type: application/json'
          -d '{"model":"Snowflake/snowflake-arctic-embed-s","input":"x"}'
          >/dev/null
      interval: 10s
      timeout: 5s
      retries: 5
      # start_period covers cold-load and slow-network first-pull scenarios.
      # Empirical: warm-disk model load ~80-90s; first-time HF fetch on a slow
      # connection adds another minute or two. 2026-06-04 paid run #6 hit
      # 223s cold-load on arm64 (7s past the previous 230s grace) → compose
      # --wait gave up. Bumped to 300s + 50s retry = 350s. No cost on warm
      # runs — start_period only suppresses failure counting, doesn't delay
      # the healthy transition.
      start_period: 300s
    # 12-core host budget (see docs); 1 CPU is plenty for arctic-embed-s
    # (33M params, Rust/fastembed-rs). Iso-tested at 16/16 silent
    # successes during 30+ min @hard run.
    deploy:
      resources:
        limits:
          cpus: "1"

  # seminstruct-fast serves the latency-critical graph capability:
  # query_classification (T3 fallback). Tiny 0.6B model with thinking off
  # so the 5-class JSON classification returns sub-second.
  #
  # CPU budget: capped at 1 CPU + MODEL_THREADS=1 to prevent llama.cpp's
  # OpenMP from grabbing all 12 host cores under contention. Iso-tested
  # 2026-05-05: 200ms/call warm, 580ms at 5-concurrent — well under the
  # 15s capability timeout. Without this cap, 3× seminstruct + 4×
  # semsource indexing oversubscribes the host ~4.5× and tips every
  # graph_search past 30s. See seminstruct Dockerfile MODEL_THREADS docstring.
  seminstruct-fast:
    image: ghcr.io/c360studio/seminstruct:qwen3-0.6b
    environment:
      - MODEL_ALIAS=qwen3-0.6b
      - MODEL_REASONING=off
      - MODEL_THREADS=1
      - MODEL_PARALLEL=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 4G

  # seminstruct-answer serves answer_synthesis (graph_search → globalSearch).
  # 1.7B is sub-3s per ephemeral answer on Apple Silicon CPU; quality is
  # solid because answer_synthesis is extractive over supplied community
  # summaries. The 8B is reserved for community_summary, where MS GraphRAG
  # research showed sub-7B saves garbage to the persisted graph. Probed
  # 2026-05-05: ~25 tok/s warm, vs 8B's 0.83 tok/s on the same hardware.
  #
  # CPU budget: 2 CPUs + MODEL_THREADS=2. Iso-tested 2026-05-05: 1.5-2.2s
  # warm, 6.1-8.4s at 5-concurrent — within 30s budget. Sublinear past 2
  # threads on 1.7B per llama.cpp profiling.
  seminstruct-answer:
    image: ghcr.io/c360studio/seminstruct:qwen3-1.7b
    environment:
      - MODEL_ALIAS=qwen3-1.7b
      - MODEL_REASONING=off
      - MODEL_THREADS=2
      - MODEL_PARALLEL=2
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 45s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 6G

  # seminstruct-summary serves community_summary only (background batch,
  # persisted into graph). 8B is required per MS GraphRAG quality bar.
  # REASONING=off because auto/think eats the entire token budget before
  # producing content (verified 2026-05-05). Concurrent inference (-np 4
  # -cb baked into the image) so parallel batches don't queue head-of-line.
  #
  # CPU budget: 2 CPUs + MODEL_THREADS=2. graph-clustering's enable_llm:false
  # means this container is dormant during runs; the 2-CPU cap is for the
  # eventual case when community summaries are turned back on. MODEL_PARALLEL=1
  # halves KV-cache footprint (8B × 16K ctx × 4 slots OOM-killed at 8G memory
  # cap on first @hard run with caps; 12G + 1 slot keeps headroom for the
  # GGUF + transient llama.cpp spikes during model load).
  seminstruct-summary:
    image: ghcr.io/c360studio/seminstruct:qwen3-8b
    environment:
      - MODEL_ALIAS=qwen3-8b
      - MODEL_REASONING=off
      - MODEL_THREADS=2
      - MODEL_PARALLEL=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 12G

volumes:
  ui-nats-data:

networks:
  default:
    name: semspec-ui-e2e
