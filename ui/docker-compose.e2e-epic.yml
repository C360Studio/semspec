# Epic scenario overlay for UI E2E tests with real LLM.
#
# Adds 3 external semsource instances (OSH, Meshtastic, OGC) to the UI LLM stack
# so the planner can draw on extra-domain knowledge for the Meshtastic driver
# epic. Also swaps the workspace from go-project to osh-driver-meshtastic
# (Java/Maven).
#
# Topology: all 4 semsources run in headless mode against the shared NATS.
# Each pushes entities to graph.ingest.entity; semspec's graph-ingest aggregates
# everything into a single local graph. There is NO HTTP federation — the
# external graph-gateway components are not started in headless mode, so
# GRAPH_SOURCES is not used here. (Headless mode also prunes foreign
# components from the shared semstreams_config KV, which is why semspec's
# graph-gateway can register cleanly with subject=:8082.)
#
# Usage:
#   task e2e:ui:test:llm -- claude hard
#
# Or manually:
#   docker compose -f ui/docker-compose.e2e.yml \
#     -f ui/docker-compose.e2e-llm.yml \
#     -f ui/docker-compose.e2e-epic.yml up -d --wait
#
# Shared semsource-clones volume (added 2026-05-10): the three external
# semsources clone their repos into this volume; the sandbox mounts it
# read-only at /sources. Closes the AST/docs lens gap — agent bash can
# now read pom.xml, package.json, LICENSE, raw upstream source bodies
# that graph_search/graph_query don't return as triples. Drove the
# fix on take 1 (gemini @hard 2026-05-10 req.3) Maven coord fabrication.

volumes:
  semsource-clones:
    driver: local

services:
  # Workspace semsource: keep the LLM-overlay semsource definition but ensure
  # it watches the same WORKSPACE_HOST_PATH bind mount the rest of the stack
  # uses. The task wrapper sets E2E_FIXTURE=osh-driver-meshtastic for `hard`
  # tier, which feeds the base workspace-init container — no hardcoded
  # fixture path needed here.
  semsource:
    volumes:
      - ../docker/semsource.json:/etc/semsource/semsource.json:ro
      - ${WORKSPACE_HOST_PATH:-/tmp/semspec-ui-workspace}:/workspace:ro

  # Sandbox: also adds the read-only view of the shared semsource-clones
  # volume at /sources/, where the 3 external semsources clone osh-core /
  # ogc-cs / meshtastic upstream. Agent bash reads upstream files there
  # for ground-truth coords instead of fabricating them.
  sandbox:
    volumes:
      - ${WORKSPACE_HOST_PATH:-/tmp/semspec-ui-workspace}:/workspace
      - semsource-clones:/sources:ro

  # External semsources are CHAINED on healthy = "seeding done" — chain
  # order is meshtastic (smallest) → ogc → osh (largest). Each one's
  # initial seed burst runs in isolation: git clone + publish-all-entities
  # cycles produce >1000 NATS publishes/sec for a few seconds, which
  # historically pegged NATS at >100% CPU and starved the agentic LLM
  # loops + seminstruct backends running on the same host. Serializing
  # the bursts spreads the load over time without dropping any source.
  #
  # The healthcheck hits /source-manifest/status — semsource publishes
  # phase="ready" only when all configured sources have completed their
  # initial scan. Image already has wget; no extra layer needed.
  # Generous retries (60×15s = 15min) cover OSH's clone + java AST
  # indexing on slow links.
  #
  # Workspace semsource is intentionally NOT in the chain — it's small,
  # watch:true (continuous low-rate polling), and starts in parallel
  # with semspec. Adding it to the chain would delay agentic startup
  # for no real benefit.

  # External semsource: Meshtastic (smallest — start first)
  semsource-meshtastic:
    image: ghcr.io/c360studio/semsource:latest
    depends_on:
      nats:
        condition: service_healthy
      semspec:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../configs/semsource/meshtastic.json:/etc/semsource/semsource.json:ro
      - semsource-clones:/shared/sources
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      # phase="ready" → all sources in this semsource finished seeding.
      # See chain comment above for the serialization rationale.
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/source-manifest/status 2>/dev/null | grep -q '\"phase\":\"ready\"'"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 60s
    # 12-core host budget. Bursty at seed (git clone + AST), idle after
    # phase=ready. Serial chain means only one external is bursting at
    # a time, so 1 CPU per is fine for the steady-state agentic phase.
    deploy:
      resources:
        limits:
          cpus: "1"

  # External semsource: OGC Connected Systems spec (medium — second)
  semsource-ogc:
    image: ghcr.io/c360studio/semsource:latest
    depends_on:
      nats:
        condition: service_healthy
      semspec:
        condition: service_healthy
      semsource-meshtastic:
        condition: service_healthy  # wait for meshtastic seeding to complete
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../configs/semsource/ogc.json:/etc/semsource/semsource.json:ro
      - semsource-clones:/shared/sources
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/source-manifest/status 2>/dev/null | grep -q '\"phase\":\"ready\"'"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "1"

  # External semsource: OpenSensorHub core (largest Java repo — start last)
  semsource-osh:
    image: ghcr.io/c360studio/semsource:latest
    depends_on:
      nats:
        condition: service_healthy
      semspec:
        condition: service_healthy
      semsource-ogc:
        condition: service_healthy  # wait for ogc seeding (and transitively meshtastic)
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../configs/semsource/osh.json:/etc/semsource/semsource.json:ro
      - semsource-clones:/shared/sources
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/source-manifest/status 2>/dev/null | grep -q '\"phase\":\"ready\"'"]
      interval: 15s
      timeout: 10s
      retries: 60
      start_period: 120s  # OSH clone + Java AST is the longest single seed
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # Allow extra time for OSH (large repo) ingestion to seed the local graph.
  semspec:
    environment:
      - SEMSOURCE_READINESS_BUDGET=180s
