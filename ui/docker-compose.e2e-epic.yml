# Epic scenario overlay for UI E2E tests with real LLM.
#
# Adds 3 external semsource instances (OSH, Meshtastic, OGC) to the UI LLM stack
# so the planner can draw on extra-domain knowledge for the Meshtastic driver
# epic. Also swaps the workspace from go-project to osh-driver-meshtastic
# (Java/Maven).
#
# Topology: all 4 semsources run in headless mode against the shared NATS.
# Each pushes entities to graph.ingest.entity; semspec's graph-ingest aggregates
# everything into a single local graph. There is NO HTTP federation — the
# external graph-gateway components are not started in headless mode, so
# GRAPH_SOURCES is not used here. (Headless mode also prunes foreign
# components from the shared semstreams_config KV, which is why semspec's
# graph-gateway can register cleanly with subject=:8082.)
#
# Usage:
#   task e2e:ui:test:llm -- claude hard
#
# Or manually:
#   docker compose -f ui/docker-compose.e2e.yml \
#     -f ui/docker-compose.e2e-llm.yml \
#     -f ui/docker-compose.e2e-epic.yml up -d --wait

services:
  # Workspace semsource: swap to Java project fixture.
  semsource:
    volumes:
      - ../docker/semsource.json:/etc/semsource/semsource.json:ro
      - ../test/e2e/fixtures/osh-driver-meshtastic:/workspace:ro

  # Sandbox: swap to Java project fixture.
  sandbox:
    volumes:
      - ../test/e2e/fixtures/osh-driver-meshtastic:/workspace

  # External semsource: OpenSensorHub core (Java)
  semsource-osh:
    image: ghcr.io/c360studio/semsource:latest
    depends_on:
      nats:
        condition: service_healthy
      semspec:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../configs/semsource/osh.json:/etc/semsource/semsource.json:ro
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      # NOTE: 'version' only confirms the binary runs, not that indexing is complete.
      # Entity-count readiness is asserted by the >100-entities preflight test
      # (entities ingest into semspec's local graph via graph.ingest.entity).
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 60s  # OSH repo is large — cloning takes time
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 4G

  # External semsource: Meshtastic documentation
  semsource-meshtastic:
    image: ghcr.io/c360studio/semsource:latest
    depends_on:
      nats:
        condition: service_healthy
      semspec:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../configs/semsource/meshtastic.json:/etc/semsource/semsource.json:ro
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      # See semsource-osh note — version ≠ indexing complete; rely on the
      # entity-count preflight assertion in the @hard test.
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # External semsource: OGC Connected Systems spec
  semsource-ogc:
    image: ghcr.io/c360studio/semsource:latest
    depends_on:
      nats:
        condition: service_healthy
      semspec:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../configs/semsource/ogc.json:/etc/semsource/semsource.json:ro
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      # See semsource-osh note — version ≠ indexing complete; rely on the
      # entity-count preflight assertion in the @hard test.
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Allow extra time for OSH (large repo) ingestion to seed the local graph.
  semspec:
    environment:
      - SEMSOURCE_READINESS_BUDGET=180s
