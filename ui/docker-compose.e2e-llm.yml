# LLM overlay for UI E2E tests with real LLM providers.
#
# Passes through API keys and LLM_API_URL from the host environment.
# Uses provider-specific config when E2E_CONFIG is set.
#
# Usage:
#   LLM_API_URL=https://api.anthropic.com/v1 ANTHROPIC_API_KEY=sk-... \
#     docker compose -f docker-compose.e2e.yml -f docker-compose.e2e-llm.yml up -d
#
# Or via task:
#   LLM_API_URL=https://api.anthropic.com/v1 task e2e:ui:test:llm

services:
  semsource:
    image: ghcr.io/c360studio/semsource:377e063
    depends_on:
      workspace-init:
        condition: service_completed_successfully
      nats:
        condition: service_healthy
      semspec:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../docker/semsource.json:/etc/semsource/semsource.json:ro
      - ../docker/semsource.gitconfig:/root/.gitconfig:ro
      # Mount the same WORKSPACE_HOST_PATH semspec + sandbox see. semsource
      # runs watch-mode AST/docs indexers, so it must observe agent writes
      # to keep the federated graph consistent with what the agent actually
      # built. :ro is safe — semsource never writes to /workspace.
      # Historical: previously bind-mounted the fixture directly; the
      # E2E_FIXTURE-vs-default mismatch (caught take-18 2026-05-13) is now
      # impossible because workspace-init in the base resolves the fixture
      # once for the entire stack.
      - ${WORKSPACE_HOST_PATH:-/tmp/semspec-ui-workspace}:/workspace:ro
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3
    # 12-core host budget. Workspace semsource (watch:true, low-rate
    # polling) needs little CPU steady-state but bursts during initial
    # scan. Cap at 1 to prevent ingest from starving llama.cpp threads.
    deploy:
      resources:
        limits:
          cpus: "1"

  # Initialize ownership on the external build-cache volumes before the sandbox
  # starts. Fresh Docker volumes are root-owned, but the sandbox runs as
  # uid/gid 1000 (SANDBOX_UID/GID) — without this it cannot write its caches.
  # The chown is non-recursive (just the mountpoint): this is safe ONLY because
  # every writer into these trees runs as uid 1000 (the sandbox user; npm
  # globals live in /usr, not ~/.npm), so files written later are already
  # 1000-owned and never need re-chowning — which keeps startup instant even on
  # a multi-GB warmed volume. (semembed-cache-init uses `chown -R` because its
  # cache is small; do not copy that here.) Purely generic — no per-stack logic,
  # so nothing gradle/Java-shaped is imposed on a non-Java run.
  sandbox-cache-init:
    image: alpine:3.19
    command:
      - sh
      - -c
      - |
        set -e
        for d in /v/gomod /v/xdg /v/gradle /v/gradle-wrapper /v/m2 /v/npm; do
          mkdir -p "$$d" && chown 1000:1000 "$$d"
        done
    volumes:
      - sandbox-cache-gomod:/v/gomod
      - sandbox-cache-xdg:/v/xdg
      - sandbox-cache-gradle:/v/gradle
      - sandbox-cache-gradle-wrapper:/v/gradle-wrapper
      - sandbox-cache-m2:/v/m2
      - sandbox-cache-npm:/v/npm
    restart: "no"

  sandbox:
    build:
      context: ..
      dockerfile: docker/sandbox.Dockerfile
      args:
        SANDBOX_UID: ${SANDBOX_UID:-1000}
        SANDBOX_GID: ${SANDBOX_GID:-1000}
    command: ["--addr", ":8090", "--repo", "/workspace"]
    environment:
      # GitHub Packages credentials passthrough — needed when the dev's
      # build.gradle resolves dependencies from maven.pkg.github.com (e.g.,
      # OpenSensorHub artifacts on hybrid/hard meshtastic). GitHub Packages
      # requires authenticated reads even for PUBLIC packages — a quirk
      # that distinguishes it from Maven Central. Without these, dependency
      # resolution returns 401 and the dev fabricates stub classes to make
      # the build pass (take-29 forensics 2026-05-15: dev cp'd
      # /tmp/osh-stubs/classes/* into worktree, tests passed against fake
      # AbstractSensorModule with empty methods, no real OSH integration).
      #
      # GITHUB_ACTOR is required to be NON-EMPTY but the value is not
      # functionally checked for read access to public packages — the
      # token's scope is what gates the read. We default to "USERNAME"
      # via .env so the project doesn't couple to any specific human's
      # GitHub identity.
      GITHUB_ACTOR: ${GITHUB_ACTOR:-USERNAME}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      # Enable the sandbox QA subscriber so executable integration QA
      # (qa_level=unit/integration) runs here: plan-manager publishes
      # QARequestedEvent → sandbox runs the project test command (./gradlew
      # test) → emits QACompleted → qa-reviewer verdict. Without this the
      # sandbox runs HTTP-only and the plan wedges at ready_for_qa (the
      # backend e2e sandbox in docker/compose/e2e.yml already sets this).
      NATS_URL: nats://nats:4222
    depends_on:
      workspace-init:
        condition: service_completed_successfully
      sandbox-cache-init:
        condition: service_completed_successfully
    volumes:
      # Shared WORKSPACE_HOST_PATH — same bind mount semspec and semsource use.
      # Single host path = single workspace view, no risk of drift between
      # services (caught take-18 2026-05-13 with separate bind mounts).
      - ${WORKSPACE_HOST_PATH:-/tmp/semspec-ui-workspace}:/workspace
      # Persistent per-ecosystem build/dependency caches. A fresh container
      # otherwise re-downloads and recompiles everything from cold on the first
      # build of every run — for the heavy osh/mavlink Java tree that cold build
      # exceeds the sandbox /exec timeout and wedges the dev loop (#291). These
      # are EXTERNAL volumes (survive `down -v`, like semembed-cache) so the
      # warm cache carries across runs. Treatment is uniform across stacks — no
      # ecosystem is privileged; each tool's standard cache dir is persisted, and
      # a non-Java repo simply never writes to the gradle/m2 volumes.
      #
      # Deliberately the cache SUBDIRS, not whole ~/.gradle or ~/.m2: the sandbox
      # writes ~/.gradle/init.d/10-osh-source-substitution.gradle at startup
      # (auto-applied to every gradle build), so persisting all of ~/.gradle
      # would leak that OSH-specific init script onto unrelated runs. Mounting
      # only caches/ + wrapper/ keeps init.d (and gradle.properties / any
      # ~/.m2/settings.xml) image-controlled and ephemeral. Ownership set by
      # sandbox-cache-init.
      - sandbox-cache-gomod:/go/pkg/mod
      - sandbox-cache-xdg:/home/sandbox/.cache
      - sandbox-cache-gradle:/home/sandbox/.gradle/caches
      - sandbox-cache-gradle-wrapper:/home/sandbox/.gradle/wrapper
      - sandbox-cache-m2:/home/sandbox/.m2/repository
      - sandbox-cache-npm:/home/sandbox/.npm
    deploy:
      resources:
        limits:
          # Sized for parallel OSH-from-source gradle builds (WITH_EPIC hard tiers).
          # The 2G/2cpu/256pid cap starved 8 concurrent dev-loop builds in the
          # 2026-06-10 mavlink-hard run — sandbox pinned at 1.75/2 GiB with idle,
          # memory-starved gradle daemons + zombie java procs → execution crawled.
          cpus: "4"
          memory: 8G
          pids: 512
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  semspec:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:11434/v1}
      - SANDBOX_URL=http://sandbox:8090
      - GRAPH_SOURCES=[{"name":"workspace","graphql_url":"http://semsource:8080/graph-gateway/graphql","status_url":"http://semsource:8080/source-manifest/status","type":"semsource","entity_prefix":"semspec.semsource."}]
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - SPARKY_API_KEY=${SPARKY_API_KEY:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      # Per-tier backend timeouts/retries. taskfiles/e2e.yml sets these as task
      # env for hard/mavlink-hard tiers, but they were NOT forwarded into the
      # container, so configs/e2e-*.json fell back to its :-3600 default — on a
      # 2026-06-08 mavlink-hard run the requirement-executor used 1h instead of
      # the intended 2h and 3 still-progressing requirements were killed. Bare
      # passthrough forwards each when set; when unset the config's own default
      # applies (so non-llm/default runs are unaffected).
      - SEMSPEC_REQ_EXECUTOR_TIMEOUT_SECONDS
      - SEMSPEC_EXECUTION_MANAGER_TIMEOUT_SECONDS
      - SEMSPEC_SCENARIO_ORCH_TIMEOUT
      - SEMSPEC_RECOVERY_TIMEOUT_SECONDS
      - SEMSPEC_MAX_REQUIREMENT_RETRIES
    depends_on:
      sandbox:
        condition: service_healthy
    # Use provider-specific config if set, otherwise default
    # Examples: E2E_CONFIG=e2e-claude.json, E2E_CONFIG=e2e-gemini.json
    command: >-
      --config /app/configs/${E2E_CONFIG:-semspec.json}
      --repo /workspace
      --log-level ${LOG_LEVEL:-info}

# Per-ecosystem sandbox build/dependency caches. external:true so the normal
# e2e `down -v` cleanup does NOT wipe them — the warm cache persists across runs
# (created by taskfiles/e2e.yml ensure-model-caches; full reset via the deep
# clean / `docker volume rm sandbox-cache-*`). To force a cold run for fidelity,
# remove these volumes first.
volumes:
  sandbox-cache-gomod: # Go module cache (/go/pkg/mod)
    external: true
  sandbox-cache-xdg: # XDG cache: Go build cache + pip (~/.cache)
    external: true
  sandbox-cache-gradle: # Gradle deps + build cache (~/.gradle/caches)
    external: true
  sandbox-cache-gradle-wrapper: # Gradle wrapper distributions (~/.gradle/wrapper)
    external: true
  sandbox-cache-m2: # Maven local repository (~/.m2/repository)
    external: true
  sandbox-cache-npm: # npm cache (~/.npm)
    external: true
