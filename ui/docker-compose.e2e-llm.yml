# LLM overlay for UI E2E tests with real LLM providers.
#
# Passes through API keys and LLM_API_URL from the host environment.
# Uses provider-specific config when E2E_CONFIG is set.
#
# Usage:
#   LLM_API_URL=https://api.anthropic.com/v1 ANTHROPIC_API_KEY=sk-... \
#     docker compose -f docker-compose.e2e.yml -f docker-compose.e2e-llm.yml up -d
#
# Or via task:
#   LLM_API_URL=https://api.anthropic.com/v1 task e2e:ui:test:llm

services:
  semsource:
    image: ghcr.io/c360studio/semsource:latest
    depends_on:
      nats:
        condition: service_healthy
      semspec:
        condition: service_healthy
    environment:
      - NATS_URL=nats://nats:4222
      - SEMSOURCE_LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - ../docker/semsource.json:/etc/semsource/semsource.json:ro
      - ../docker/semsource.gitconfig:/root/.gitconfig:ro
      # Honor E2E_FIXTURE so @hard tier (osh-driver-meshtastic) gets the
      # right workspace mount on the bare LLM stack. Without this, every
      # run lands go-project regardless of tier — caught take-18
      # 2026-05-13 where @hard WITH_EPIC=0 silently mounted go-project
      # and the dev hit iter=80 reconciling "Meshtastic Java" brief with
      # a Go workspace. Epic overlay overrides this for WITH_EPIC=1; this
      # default keeps the bare overlay consistent with base e2e.yml.
      - ../test/e2e/fixtures/${E2E_FIXTURE:-go-project}:/workspace:ro
    command: ["run", "--config", "/etc/semsource/semsource.json", "--log-level", "${LOG_LEVEL:-info}"]
    healthcheck:
      test: ["CMD", "semsource", "version"]
      interval: 10s
      timeout: 3s
      retries: 3
    # 12-core host budget. Workspace semsource (watch:true, low-rate
    # polling) needs little CPU steady-state but bursts during initial
    # scan. Cap at 1 to prevent ingest from starving llama.cpp threads.
    deploy:
      resources:
        limits:
          cpus: "1"

  sandbox:
    build:
      context: ..
      dockerfile: docker/sandbox.Dockerfile
      args:
        SANDBOX_UID: ${SANDBOX_UID:-1000}
        SANDBOX_GID: ${SANDBOX_GID:-1000}
    command: ["--addr", ":8090", "--repo", "/workspace"]
    environment:
      # GitHub Packages credentials passthrough — needed when the dev's
      # build.gradle resolves dependencies from maven.pkg.github.com (e.g.,
      # OpenSensorHub artifacts on hybrid/hard meshtastic). GitHub Packages
      # requires authenticated reads even for PUBLIC packages — a quirk
      # that distinguishes it from Maven Central. Without these, dependency
      # resolution returns 401 and the dev fabricates stub classes to make
      # the build pass (take-29 forensics 2026-05-15: dev cp'd
      # /tmp/osh-stubs/classes/* into worktree, tests passed against fake
      # AbstractSensorModule with empty methods, no real OSH integration).
      #
      # GITHUB_ACTOR is required to be NON-EMPTY but the value is not
      # functionally checked for read access to public packages — the
      # token's scope is what gates the read. We default to "USERNAME"
      # via .env so the project doesn't couple to any specific human's
      # GitHub identity.
      GITHUB_ACTOR: ${GITHUB_ACTOR:-USERNAME}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    volumes:
      # Mirrors the semsource workspace mount — see comment there. Both
      # services MUST point at the same fixture or planner scope checks
      # and worktree merges drift (semspec sees one tree, sandbox sees
      # another).
      - ../test/e2e/fixtures/${E2E_FIXTURE:-go-project}:/workspace
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
          pids: 256
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/health"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  semspec:
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - LLM_API_URL=${LLM_API_URL:-http://host.docker.internal:11434/v1}
      - SANDBOX_URL=http://sandbox:8090
      - GRAPH_SOURCES=[{"name":"workspace","graphql_url":"http://semsource:8080/graph-gateway/graphql","status_url":"http://semsource:8080/source-manifest/status","type":"semsource","entity_prefix":"semspec.semsource."}]
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - SPARKY_API_KEY=${SPARKY_API_KEY:-}
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
    depends_on:
      sandbox:
        condition: service_healthy
    # Use provider-specific config if set, otherwise default
    # Examples: E2E_CONFIG=e2e-claude.json, E2E_CONFIG=e2e-gemini.json
    command: >-
      --config /app/configs/${E2E_CONFIG:-semspec.json}
      --repo /workspace
      --log-level ${LOG_LEVEL:-info}
