name: QA
# Default QA workflow scaffolded by semspec project-manager.
# Customize this file to add integration test services (databases, message
# brokers, etc.) as GitHub Actions `services:` entries on the job.
# See: https://docs.github.com/en/actions/using-containerized-services
on: [push, pull_request]
jobs:
  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: false
      - name: Integration tests
        run: go test ./... -tags=integration -v
      - name: Archive coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: |
            coverage.out
            *.log
